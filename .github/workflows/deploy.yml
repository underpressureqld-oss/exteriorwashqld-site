name: Build and Deploy to Hostinger via SFTP

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ensures Node.js 24 for all actions

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Generate sitemap (optional)
        run: |
          if [ -f tools/generate-sitemap.js ]; then
            node tools/generate-sitemap.js
          else
            echo "No sitemap generator found, skipping..."
          fi

      - name: Build site
        run: npm run build

      - name: Upload to Hostinger via SFTP
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.FTP_SERVER }}          # e.g., 153.92.10.159
          username: ${{ secrets.FTP_USERNAME }}    # e.g., u796749464.exteriorwashqld.com.au
          password: ${{ secrets.FTP_PASSWORD }}    # your FTP/SFTP password
          port: ${{ secrets.FTP_PORT }}            # usually 22 for SFTP
          source: "dist/apps/web/*"
          target: "/public_html/"                   # make sure it ends with /
          strip_components: 1                        # removes leading folder path
