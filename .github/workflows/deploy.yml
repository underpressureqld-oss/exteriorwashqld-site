name: Build and Deploy to Hostinger

# Trigger on push to main branch
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ensures Node.js 24 for all actions

    steps:
      # Step 1: Checkout your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Optional - Generate sitemap if present
      - name: Generate sitemap (optional)
        run: |
          if [ -f tools/generate-sitemap.js ]; then
            node tools/generate-sitemap.js
          else
            echo "No sitemap generator found, skipping..."
          fi

      # Step 5: Build the site
      - name: Build site
        run: npm run build

      # Step 6: Deploy to Hostinger via FTP
      - name: Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: dist/apps/web/
          remote-dir: ${{ secrets.FTP_REMOTE_DIR }}
          git-ftp-args: --insecure
