name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1 — Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 — Setup Node 24
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 3 — Install dependencies
      - name: Install dependencies
        run: npm install

      # 4 — Optional sitemap generation (won’t break if missing)
      - name: Generate sitemap (optional)
        run: |
          if [ -f tools/generate-sitemap.js ]; then
            node tools/generate-sitemap.js
          else
            echo "No sitemap generator found, skipping..."
          fi

      # 5 — Build the site
      - name: Build site
        run: npm run build

      # 6 — Upload via FTP to Hostinger
      - name: Upload to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: dist/apps/web/
          remote-dir: ${{ secrets.FTP_REMOTE_DIR }}
          git-ftp-args: --insecure
