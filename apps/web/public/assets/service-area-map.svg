<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Service area map Brisbane and Sunshine Coast">
	<defs>
		<linearGradient id="g1" x1="0" x2="1">
			<stop offset="0%" stop-color="#dbeafe" />
			<stop offset="100%" stop-color="#e6fffa" />
		</linearGradient>
		<style>
			.label { font: 600 20px/1.2 Arial, Helvetica, sans-serif; fill:#0f1724 }
			.sub { font: 400 14px/1.2 Arial, Helvetica, sans-serif; fill:#334155 }
		</style>
	</defs>
	<rect width="100%" height="100%" fill="url(#g1)" rx="8"/>

	<!-- stylised service area shapes -->
	<path d="M120 420 C200 300 340 280 480 320 C620 360 760 320 880 260 C980 210 1060 180 1100 150 L1100 450 L120 450 Z" fill="#bfdbfe" stroke="#60a5fa" stroke-width="2" opacity="0.95"/>
	<circle cx="300" cy="350" r="8" fill="#2563eb" />
	<circle cx="520" cy="330" r="8" fill="#2563eb" />
	<circle cx="760" cy="300" r="8" fill="#2563eb" />

	<!-- labels -->
	<text x="260" y="240" class="label">Brisbane</text>
	<text x="260" y="262" class="sub">We cover inner & outer suburbs</text>

	<text x="680" y="220" class="label">Sunshine Coast</text>
	<text x="680" y="242" class="sub">From Caloundra to Noosa</text>

	<!-- legend -->
	<g transform="translate(40,40)">
		<rect x="0" y="0" width="220" height="110" rx="8" fill="#ffffffcc" stroke="#e2e8f0"/>
		<text x="16" y="28" class="label">Service Area</text>
		<circle cx="20" cy="58" r="8" fill="#2563eb" />
		<text x="36" y="62" class="sub">Priority suburbs</text>
		<rect x="16" y="76" width="12" height="12" fill="#bfdbfe" stroke="#60a5fa"/>
		<text x="36" y="86" class="sub">Coverage area</text>
	</g>

	<!-- accessibility fallback text for older clients -->
	<title>Service area map — Brisbane & Sunshine Coast</title>
</svg>